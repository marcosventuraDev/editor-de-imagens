<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Modal – Redutor de imagens</title>

  <!--CSS-->
  <link rel="stylesheet" type="text/css" href="assets/css/style.css">
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

</head>

<body class="bg-light">
  <div class="container py-4">
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#imageReducerModal">
      Abrir Redutor de Imagens
    </button>
  </div>

  <!-- input escondido -->
  <input id="irFileInput" type="file" accept="image/*" multiple hidden>

  <!-- MODAL -->
  <div class="modal fade ir-modal" id="imageReducerModal" tabindex="-1" aria-labelledby="imageReducerTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl modal-fullscreen-sm-down">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title" id="imageReducerTitle">Redutor de imagens</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>

        <div class="modal-body py-3">
          <div class="row g-3 align-items-start">

            <!-- LEFT -->
            <div class="col-12 col-lg-8">
              <div class="ir-preview-wrap">
                <div class="ir-preview ratio ratio-4x3" id="previewClickable" role="button" aria-label="Adicionar imagens">
                  <img id="mainPreview" alt="Preview" class="w-100 h-100 object-fit-down" style="display:none;">
                  <div class="ir-empty" id="irEmptyState">
                    <div class="box">
                      <i class="fa-regular fa-images"></i>
                      <div class="mt-2 fw-semibold">Clique para adicionar imagens</div>
                      <div class="small">Você pode selecionar até <b>6</b> imagens.</div>
                    </div>
                  </div>
                </div>
                  <!-- META -->
              <div class="ir-preview-meta" id="irPreviewMeta" style="display: none;">
                <span class="ir-pill" id="metaDims">
                  <i class="fa-solid fa-ruler-combined"></i><span>—</span>
                </span>
                <span class="ir-pill" id="metaSize">
                  <i class="fa-solid fa-weight-hanging"></i><span>—</span>
                </span>
                <span class="ir-pill" id="metaStatus">
                  <i class="fa-solid fa-circle-info"></i><span>—</span>
                </span>
              </div>

              <!-- FOOTLINE -->
              <div class="ir-footline">
                <span class="ir-msg" id="irMsg">Clique no preview para adicionar imagens.</span>
                <span class="ir-count" id="irCount">
                  <i class="fa-regular fa-images"></i><span>0/6</span>
                </span>
              </div>
              <div class="d-flex gap-2">
               <button class="btn ir-action-btn d-flex flex-column align-items-center justify-content-center gap-1 py-2"
                        type="button" data-action="undo" id="btnUndo">
                  <i class="fa fa-reply"></i>
                  <span>Desfazer</span>
                </button>

                <button class="btn ir-action-btn d-flex flex-column align-items-center justify-content-center gap-1 py-2"
                        type="button" data-action="redo" id="btnRedo">
                  <i class="fa fa-share"></i>
                  <span>Refazer</span>
                </button>
                <button class="btn ir-action-btn d-flex flex-column align-items-center justify-content-center gap-1 py-2"
                        type="button" data-action="crop" disabled id="btnCrop">
                  <i class="fa-solid fa-scissors"></i>
                  <span>Cortar</span>
                </button>
                 <button class="btn ir-action-btn d-flex flex-column align-items-center justify-content-center gap-1 py-2"
                        type="button" data-action="fix" disabled id="btnFix">
                  <i class="fa-solid fa-wand-magic-sparkles"></i>
                  <span>Ajustar</span>
                </button>

              </div>
              </div>

            

              <!-- ações -->
              <div class="d-flex gap-2 mt-3 ir-actions flex-nowrap flex-md-wrap">
             
                
                <button class="btn ir-action-btn d-flex flex-column align-items-center justify-content-center gap-1 py-2"
        				        type="button" data-action="rotateL" disabled id="btnRotateL">
        				  <i class="fa-solid fa-rotate-left"></i>
        				  <span>Girar</span>
        				</button>

        				<button class="btn ir-action-btn d-flex flex-column align-items-center justify-content-center gap-1 py-2"
        				        type="button" data-action="rotateR" disabled id="btnRotateR">
        				  <i class="fa-solid fa-rotate-right"></i>
        				  <span>Girar</span>
        				</button>

               
                <button class="btn ir-action-btn d-flex flex-column align-items-center justify-content-center gap-1 py-2"
                        type="button" data-action="remove" disabled id="btnRemove">
                  <i class="fa-regular fa-trash-can"></i>
                  <span>Remover</span>
                </button>

                <button class="btn ir-action-btn d-flex flex-column align-items-center justify-content-center gap-1 py-2"
                        type="button" data-action="save" disabled id="btnSave">
                  <i class="fa-regular fa-floppy-disk"></i>
                  <span>Salvar</span>
                </button>
              </div>
            </div>

            <!-- RIGHT/BOTTOM: thumbs -->
            <div class="col-12 col-lg-4">
              <div class="row row-cols-3 row-cols-lg-2 g-2" id="thumbsGrid"></div>
            </div>

          </div>
        </div><!-- /modal-body -->

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- SOMENTE o módulo -->
<script type="module" src="/assets/js/image-reducer/index.js"></script>

<!-- Image Reducer JS (separado) -->

</body>

</html>
